<!-- Styledex — clickable prototype v0.6 (cyber-terminal aesthetic) -->
<!-- ROLLBACK: historical versions saved as *_v1..v5 backup html -->
<!-- In-app rollback of the new heavy FX: use the [FX] toggle in the top bar. -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Styledex // STYLE TERMINAL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

:root{
  --bg:#05070d; --panel:#080c16; --line:#3b4ea8; --line-bright:#6c7cff;
  --glow:#8b9bff; --green:#7dffb0; --green-dim:#2f6e4f; --text:#aeb9ff;
  --text-dim:#5e6aa8; --white:#e8ecff;
  --mono:'Share Tech Mono',ui-monospace,'Courier New',monospace;
  --pix:'VT323',monospace;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--mono)}
html{overscroll-behavior-x:contain}
body{
  min-height:100vh;
  background:
    radial-gradient(1200px 600px at 50% -10%, rgba(60,80,200,.12), transparent 60%),
    repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px),
    var(--bg);
  letter-spacing:.04em; -webkit-font-smoothing:none;
}
/* static CRT scanlines */
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:9990;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 1px, transparent 1px 2px);
  mix-blend-mode:multiply;opacity:.5;animation:flick 6s infinite steps(60);
}
@keyframes flick{0%,97%{opacity:.5}98%{opacity:.38}100%{opacity:.5}}

/* ====== ENHANCED FX (gated under body.fxhigh so [FX] toggle reverts) ====== */
/* moving scan sweep */
body.fxhigh::before{
  content:"";position:fixed;left:0;right:0;height:140px;top:-140px;pointer-events:none;z-index:9991;
  background:linear-gradient(180deg, transparent, rgba(125,255,176,.06) 60%, rgba(139,155,255,.10));
  animation:sweep 7s linear infinite;
}
@keyframes sweep{0%{top:-160px}100%{top:100%}}
/* film grain */
.grain{display:none}
body.fxhigh .grain{
  display:block;position:fixed;inset:0;pointer-events:none;z-index:9989;opacity:.05;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='80' height='80' filter='url(%23n)'/></svg>");
}
/* corner registration crosshairs */
.corners{display:none}
body.fxhigh .corners{display:block}
.corners i{position:fixed;width:18px;height:18px;border:1px solid var(--line-bright);z-index:9992;pointer-events:none;opacity:.55}
.corners i:nth-child(1){top:8px;left:8px;border-right:0;border-bottom:0}
.corners i:nth-child(2){top:8px;right:8px;border-left:0;border-bottom:0}
.corners i:nth-child(3){bottom:8px;left:8px;border-right:0;border-top:0}
.corners i:nth-child(4){bottom:8px;right:8px;border-left:0;border-top:0}
.corners i::after{content:"";position:absolute;width:5px;height:5px;background:var(--green);top:-3px;left:-3px;opacity:.7}
/* boot flicker once */
#boot{display:none}
body.fxhigh #boot{display:block;position:fixed;inset:0;z-index:9998;background:var(--bg);
  animation:boot 1.1s ease-out forwards;pointer-events:none}
@keyframes boot{0%{opacity:1}15%{opacity:.2}22%{opacity:.9}40%{opacity:.05}55%{opacity:.6}100%{opacity:0;visibility:hidden}}
/* title glitch only under fxhigh */
body.fxhigh .brand:hover, body.fxhigh .dhead .nm:hover{animation:glitch .35s steps(2) 2}
@keyframes glitch{
  0%{text-shadow:0 0 8px var(--glow)}
  25%{text-shadow:-2px 0 var(--green),2px 0 #ff2e88}
  50%{text-shadow:2px 0 var(--green),-2px 0 #19f0ff}
  100%{text-shadow:0 0 8px var(--glow)}
}
body.fxhigh .card:hover .swatch::after{
  content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(125,255,176,.12));
  animation:cardscan .6s linear;pointer-events:none
}
@keyframes cardscan{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}
/* 电流马赛克干扰：页面不动，只在叠层做撕裂条带 + 马赛克静电（仅 fxhigh，JS 间歇触发 body.glitching） */
.glitchfx{display:none}
body.fxhigh.glitching .glitchfx{display:block;position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:9993;animation:gint .4s steps(5) 1}
.glitchfx::before{content:"";position:absolute;inset:0;mix-blend-mode:screen;
  background:repeating-linear-gradient(0deg, rgba(255,46,136,.14) 0 2px, transparent 2px 4px, rgba(25,240,255,.14) 4px 6px, transparent 6px 13px);
  animation:gband .4s steps(6) 1}
.glitchfx::after{content:"";position:absolute;inset:0;mix-blend-mode:overlay;opacity:.55;
  background-image:repeating-linear-gradient(90deg, rgba(255,255,255,.10) 0 3px, transparent 3px 7px),repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 3px, transparent 3px 7px);
  animation:gmos .4s steps(7) 1}
@keyframes gint{0%{opacity:0}10%{opacity:1}45%{opacity:.8}72%{opacity:.35}100%{opacity:0}}
@keyframes gband{
  0%{clip-path:inset(8% 0 84% 0);transform:translateX(-8px)}
  18%{clip-path:inset(40% 0 50% 0);transform:translateX(8px)}
  36%{clip-path:inset(68% 0 14% 0);transform:translateX(-5px)}
  54%{clip-path:inset(22% 0 62% 0);transform:translateX(10px)}
  72%{clip-path:inset(52% 0 32% 0);transform:translateX(-10px)}
  88%{clip-path:inset(12% 0 74% 0);transform:translateX(6px)}
  100%{clip-path:inset(0 0 100% 0);transform:translateX(0)}
}
@keyframes gmos{0%{background-position:0 0,0 0;opacity:.5}33%{background-position:5px 2px,2px 5px;opacity:.72}66%{background-position:-4px 1px,1px -4px;opacity:.4}100%{background-position:0 0,0 0;opacity:0}}

.wrap{max-width:1280px;margin:0 auto;padding:26px 26px 96px}
/* 仅在比 14" 更宽的外接屏整体放大；14"(~1512) 保持原始比例，留呼吸感 */
@media(min-width:1700px){ body{zoom:1.1} }
@media(min-width:2100px){ body{zoom:1.26} }
@media(min-width:2560px){ body{zoom:1.42} }

/* top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--line);
  padding:10px 14px;margin-bottom:14px;background:linear-gradient(180deg,rgba(108,124,255,.08),transparent);position:relative;gap:10px;flex-wrap:wrap}
.topbar .brand{color:var(--white);font-size:18px;letter-spacing:.18em;text-shadow:0 0 8px var(--glow);cursor:default}
.topbar .brand b{color:var(--green);text-shadow:0 0 8px var(--green)}
.topbar .right{display:flex;align-items:center;gap:14px}
.topbar .meta{font-size:11px;color:var(--text-dim)}
.fxbtn{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--green);background:transparent;
  border:1px solid var(--green-dim);padding:5px 10px;cursor:pointer}
.fxbtn:hover{background:var(--green-dim);color:var(--white)}
.fxbtn b{color:var(--green)}
.blink{animation:bl 1.1s steps(2) infinite}
@keyframes bl{50%{opacity:0}}

/* decorative readout strip */
.readout{display:flex;gap:18px;font-size:10px;color:var(--text-dim);border:1px solid var(--line);
  border-top:0;padding:5px 14px;margin-bottom:18px;letter-spacing:.12em;overflow:hidden;white-space:nowrap}
.readout b{color:var(--green)}
/* typing tagline bar */
.tagbar{border:1px solid var(--line);border-top:0;padding:7px 14px;margin-bottom:18px;font-size:12px;
  color:var(--green);letter-spacing:.08em;min-height:30px;display:flex;align-items:center;background:rgba(8,12,22,.5)}
.tagbar .tcur{animation:bl 1s steps(2) infinite;margin-left:2px}
/* vignette + side rails (fxhigh only) */
.vig{display:none}
body.fxhigh .vig{display:block;position:fixed;inset:0;pointer-events:none;z-index:9988;
  box-shadow:inset 0 0 180px 40px rgba(0,0,0,.55)}
.rail{display:none}
body.fxhigh .rail{display:block;position:fixed;top:90px;bottom:90px;width:10px;z-index:9992;pointer-events:none;
  background-image:repeating-linear-gradient(0deg,var(--line-bright) 0 1px,transparent 1px 14px);opacity:.35}
body.fxhigh .rail-l{left:14px;border-left:1px solid var(--line)}
body.fxhigh .rail-r{right:14px;border-right:1px solid var(--line)}
@media(max-width:1180px){body.fxhigh .rail{display:none}}

.panel{position:relative;border:1px solid var(--line);background:var(--panel);padding:16px}
.panel::before,.panel::after{content:"";position:absolute;width:12px;height:12px;border:2px solid var(--line-bright)}
.panel::before{top:-1px;left:-1px;border-right:0;border-bottom:0}
.panel::after{bottom:-1px;right:-1px;border-left:0;border-top:0}

.sectlabel{font-size:11px;color:var(--green);letter-spacing:.2em;margin-bottom:12px;
  border-bottom:1px dashed var(--green-dim);padding-bottom:6px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
.sectlabel span{color:var(--text-dim)}

.filterhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px}
.fh-l{font-size:11px;color:var(--green);letter-spacing:.2em}
.tagtoggle{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--green);background:transparent;
  border:1px solid var(--green-dim);padding:5px 12px;cursor:pointer;white-space:nowrap}
.tagtoggle:hover{background:var(--green-dim);color:var(--white)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.tagdrawer{position:relative;border:1px solid var(--line-bright);background:rgba(8,12,22,.7);
  padding:14px;margin-bottom:16px;max-height:240px;overflow:auto;animation:drawer .22s ease-out}
.tagdrawer::before,.tagdrawer::after{content:"";position:absolute;width:12px;height:12px;border:2px solid var(--green)}
.tagdrawer::before{top:-1px;left:-1px;border-right:0;border-bottom:0}
.tagdrawer::after{bottom:-1px;right:-1px;border-left:0;border-top:0}
@keyframes drawer{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.tagdrawer .dh{font-size:10px;color:var(--text-dim);letter-spacing:.16em;margin-bottom:11px;
  border-bottom:1px dashed var(--green-dim);padding-bottom:7px;display:flex;justify-content:space-between;gap:8px}
.tagdrawer .dh b{color:var(--green)}
.tagdrawer .dchips{display:flex;flex-wrap:wrap;gap:7px}
.chip{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--text);
  border:1px solid var(--line);background:transparent;padding:6px 12px;cursor:pointer;text-transform:uppercase}
.chip:hover{border-color:var(--line-bright);color:var(--white)}
.chip.on{background:var(--line-bright);color:#04060c;border-color:var(--line-bright);box-shadow:0 0 12px rgba(108,124,255,.5)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}

.card{position:relative;border:1px solid var(--line);background:var(--panel);cursor:pointer;overflow:hidden;transition:.15s}
.card:hover{border-color:var(--line-bright);transform:translateY(-2px);box-shadow:0 6px 24px rgba(40,55,160,.35)}
.swatch{height:168px;position:relative;overflow:hidden;background:#04060c}
/* collage bento cells */
.collage{position:absolute;inset:0;display:grid;grid-template-columns:62% 38%;grid-template-rows:1fr 1fr;gap:2px;background:var(--line)}
.collage .cell{position:relative;overflow:hidden;background:#04060c}
.collage .cell:nth-child(1){grid-row:1 / span 2}
.collage .cell .tag{position:absolute;top:4px;left:4px;font-size:7px;letter-spacing:.12em;color:#fff;
  background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.25);padding:1px 4px;z-index:3}
.card .barcode{position:absolute;top:8px;right:8px;font-size:9px;color:rgba(232,236,255,.85);letter-spacing:.1em;
  background:rgba(4,6,12,.6);padding:2px 5px;border:1px solid rgba(139,155,255,.4);z-index:4}
.favbtn{position:absolute;top:7px;left:7px;z-index:5;width:24px;height:24px;padding:0;cursor:pointer;
  font-family:var(--mono);font-size:13px;line-height:1;color:var(--green);background:rgba(4,6,12,.62);border:1px solid var(--green-dim);
  opacity:0;transition:opacity .15s}
.card:hover .favbtn{opacity:1}              /* 悬停才显示 */
.favbtn:hover{background:var(--green-dim);color:var(--white)}
.favbtn.on{opacity:1;color:var(--green);border-color:var(--green);box-shadow:0 0 10px rgba(125,255,176,.45)} /* 已收藏则常驻 */
.savebtn{margin-top:8px;font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--green);
  background:transparent;border:1px solid var(--green-dim);padding:5px 12px;cursor:pointer}
.savebtn:hover{background:var(--green-dim);color:var(--white)}
.savebtn.on{background:var(--green);color:#04060c;border-color:var(--green)}
.boardempty{border:1px dashed var(--green-dim);padding:54px 20px;text-align:center;color:var(--text-dim);
  font-size:14px;letter-spacing:.08em;line-height:2.1;background:rgba(8,12,22,.4)}
.boardempty span{font-size:11px;opacity:.7}
.card .enter{position:absolute;bottom:8px;right:8px;font-size:9px;letter-spacing:.14em;color:#04060c;
  background:var(--green);padding:3px 8px;z-index:4;opacity:0;transform:translateX(6px);transition:.15s}
.card:hover .enter{opacity:1;transform:none}
.card .cap{padding:10px 12px;border-top:1px solid var(--line)}
.card .cap .id{font-size:9px;color:var(--text-dim);letter-spacing:.18em}
.card .cap .nm{color:var(--white);font-size:15px;letter-spacing:.06em;margin-top:2px;display:flex;justify-content:space-between;align-items:baseline;gap:6px}
.card .cap .nm small{color:var(--green);font-size:11px;white-space:nowrap}
.card .cap .tg{font-size:10px;color:var(--text-dim);margin-top:6px}

/* DETAIL */
.hide{display:none!important}
.back{font-family:var(--mono);font-size:12px;color:var(--green);background:transparent;border:1px solid var(--green-dim);
  padding:7px 14px;cursor:pointer;letter-spacing:.12em;margin-bottom:16px}
.back:hover{background:var(--green-dim);color:var(--white)}
.dhead{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;
  border:1px solid var(--line);padding:16px;margin-bottom:16px;background:linear-gradient(180deg,rgba(108,124,255,.08),transparent)}
.dhead .id{font-size:11px;color:var(--text-dim);letter-spacing:.2em}
.dhead .nm{font-size:30px;color:var(--white);letter-spacing:.05em;text-shadow:0 0 12px var(--glow);line-height:1.1;cursor:default}
.dhead .nm small{display:block;font-size:14px;color:var(--green);letter-spacing:.1em;margin-top:4px;text-shadow:none}
.dhead .stars{color:var(--green);font-size:18px;letter-spacing:3px}
.oneliner{display:flex;align-items:center;gap:12px;flex-wrap:wrap;border:1px solid var(--green-dim);
  background:linear-gradient(90deg,rgba(125,255,176,.10),rgba(125,255,176,.02) 60%,transparent);
  padding:13px 18px;margin-bottom:16px;position:relative;overflow:hidden}
.oneliner::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green);box-shadow:0 0 10px var(--green)}
.oneliner .ol-lbl{color:var(--text-dim);font-size:11px;letter-spacing:.14em;white-space:nowrap}
.oneliner .ol-txt{color:var(--white);font-size:17px;letter-spacing:.03em;text-shadow:0 0 8px rgba(125,255,176,.25)}
.whenbox{font-size:13px;color:var(--text);line-height:1.7}
.gauges{display:flex;flex-direction:column;gap:8px}
.grow{display:grid;grid-template-columns:92px 1fr;gap:10px;align-items:center}
.gk{font-size:10px;color:var(--green);letter-spacing:.1em}
.gtrack{display:flex;gap:4px}
.gseg{flex:1;text-align:center;font-size:9px;color:var(--text-dim);border:1px solid var(--line);padding:4px 0;letter-spacing:.04em}
.gseg.on{background:var(--line-bright);color:#04060c;border-color:var(--line-bright);box-shadow:0 0 10px rgba(108,124,255,.5);font-weight:700}
.gseg.gclk{cursor:pointer;transition:.12s}
.gseg.gclk:hover{border-color:var(--green);color:var(--green)}
.gseg.gclk.on:hover{color:#04060c}
.laynar{margin-top:11px;font-size:12px;color:var(--white);letter-spacing:.04em;border-top:1px dashed var(--green-dim);padding-top:9px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.laynar b{color:var(--green)}
.laypanel{position:relative;padding-bottom:38px}
.layreset{position:absolute;right:16px;bottom:13px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;
  color:var(--green);background:var(--panel);border:1px solid var(--green-dim);padding:4px 10px;cursor:pointer;
  opacity:0;pointer-events:none;transition:.15s;z-index:2}
.layreset.show{opacity:1;pointer-events:auto}
.layreset:hover{background:var(--green-dim);color:var(--white)}
/* 回到顶部 */
#totop{position:fixed;right:22px;bottom:26px;z-index:9994;display:none;align-items:center;gap:7px;
  font-family:var(--mono);font-size:12px;letter-spacing:.14em;color:var(--green);background:var(--panel);
  border:1px solid var(--green-dim);padding:11px 14px;cursor:pointer;box-shadow:0 0 16px rgba(125,255,176,.22)}
#totop:hover{background:var(--green-dim);color:var(--white);box-shadow:0 0 24px rgba(125,255,176,.5)}
#totop.show{display:flex}
#totop .ar{animation:upbob 1.4s ease-in-out infinite}
#totop small{font-size:9px;letter-spacing:.2em;opacity:.85}
@keyframes upbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
#totop::before,#totop::after{content:"";position:absolute;width:8px;height:8px;border:2px solid var(--green)}
#totop::before{top:-1px;left:-1px;border-right:0;border-bottom:0}
#totop::after{bottom:-1px;right:-1px;border-left:0;border-top:0}
.cols{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
@media(max-width:780px){.cols{grid-template-columns:1fr}}
.dpanel{margin-bottom:16px}
.recipe .row{display:grid;grid-template-columns:120px 1fr;gap:10px;padding:9px 0;border-bottom:1px dashed rgba(59,78,168,.4);font-size:13px}
.recipe .row:last-child{border-bottom:0}
.recipe .k{color:var(--green);letter-spacing:.14em;font-size:11px;padding-top:2px}
.recipe .v{color:var(--text);line-height:1.45}
.pal{display:flex;gap:0;flex-wrap:wrap;margin-top:4px}
.sw{flex:1;min-width:54px;height:58px;display:flex;align-items:flex-end;justify-content:center;cursor:pointer;
  font-size:9px;color:rgba(255,255,255,.85);padding-bottom:4px;position:relative;border:1px solid rgba(0,0,0,.4);
  letter-spacing:.05em;text-shadow:0 1px 2px rgba(0,0,0,.6)}
.sw:hover::after{content:"COPY";position:absolute;top:4px;left:0;right:0;text-align:center;font-size:8px;color:#fff}
.sw.copied::after{content:"COPIED ✓";position:absolute;top:4px;left:0;right:0;text-align:center;font-size:8px;color:#fff}
.prompt{font-size:12px;color:var(--green);line-height:1.6;background:#04070f;border:1px solid var(--green-dim);
  padding:12px;white-space:pre-wrap;position:relative}
.copybtn{position:absolute;top:8px;right:8px;font-family:var(--mono);font-size:9px;letter-spacing:.1em;
  background:var(--green-dim);color:var(--white);border:0;padding:4px 8px;cursor:pointer}
.copybtn:hover{background:var(--green);color:#04060c}

.samples{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(max-width:520px){.samples{grid-template-columns:1fr}}
.sample{border:1px solid var(--line);padding:8px;background:var(--panel);cursor:pointer;transition:.15s;position:relative}
.sample:hover{border-color:var(--line-bright);box-shadow:0 0 14px rgba(108,124,255,.3)}
.sample .lbl{font-size:9px;color:var(--text-dim);letter-spacing:.18em;margin-bottom:7px;display:flex;justify-content:space-between}
.sample .lbl b{color:var(--green)}
.mock{height:150px;border:1px solid rgba(0,0,0,.4);overflow:hidden;position:relative}
.sample .ent{position:absolute;top:14px;right:14px;font-size:8px;letter-spacing:.14em;color:#04060c;background:var(--green);
  padding:2px 7px;opacity:0;transition:.15s;z-index:5}
.sample:hover .ent{opacity:1}

.adj{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.adjchip{font-size:11px;color:var(--text);border:1px solid var(--line);padding:7px 12px;cursor:pointer;letter-spacing:.08em}
.adjchip:hover{border-color:var(--green);color:var(--green);box-shadow:0 0 10px rgba(125,255,176,.25)}
.adjchip small{color:var(--text-dim)}

/* MODAL (enlarged sample carousel) */
.modal{position:fixed;inset:0;z-index:9995;background:rgba(2,4,10,.86);display:flex;align-items:center;justify-content:center;padding:20px}
.modal .box{width:100%;max-width:760px;border:1px solid var(--line-bright);background:var(--panel);position:relative;
  box-shadow:0 0 40px rgba(60,80,200,.4)}
.modal .box::before,.modal .box::after{content:"";position:absolute;width:14px;height:14px;border:2px solid var(--green)}
.modal .box::before{top:-1px;left:-1px;border-right:0;border-bottom:0}
.modal .box::after{bottom:-1px;right:-1px;border-left:0;border-top:0}
.modal .mbar{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding:11px 14px;background:linear-gradient(180deg,rgba(108,124,255,.1),transparent)}
.modal .mbar .t{color:var(--white);font-size:14px;letter-spacing:.1em}
.modal .mbar .t small{color:var(--green);font-size:11px;display:block;margin-top:2px}
.modal .xbtn{font-family:var(--mono);color:var(--green);background:transparent;border:1px solid var(--green-dim);padding:5px 11px;cursor:pointer;font-size:13px}
.modal .xbtn:hover{background:var(--green-dim);color:var(--white)}
.bigwrap{padding:18px;display:flex;align-items:center;gap:12px}
.arrow{flex:0 0 auto;font-family:var(--mono);font-size:22px;color:var(--green);background:transparent;border:1px solid var(--green-dim);
  width:42px;height:64px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.arrow:hover{background:var(--green-dim);color:var(--white)}
.bigmock{flex:1;position:relative;overflow:hidden;border:1px solid var(--line);background:#04060c}
.bigmock .stage{position:absolute;top:0;left:0;width:320px;height:200px;transform-origin:top left}
.mfoot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding:10px 16px;font-size:11px;color:var(--text-dim);letter-spacing:.12em}
.dots{display:flex;gap:7px;align-items:center}
.dots i{width:8px;height:8px;border:1px solid var(--green-dim);display:inline-block;border-radius:50%}
.dots i.on{background:var(--green);border-color:var(--green);box-shadow:0 0 8px var(--green)}

.foot{margin-top:34px;text-align:center;font-size:10px;color:var(--text-dim);letter-spacing:.18em;line-height:1.8}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#04060c;font-size:12px;padding:8px 16px;letter-spacing:.1em;z-index:10000;opacity:0;transition:.2s;pointer-events:none}
.toast.show{opacity:1}

function sName(s){return lang==='en'?(s.en||s.name):s.name;}
function sRecipe(s){return (lang==='en'&&I18N[s.id])?I18N[s.id].recipe:s.recipe;}
function sOne(s){return (lang==='en'&&I18N[s.id])?I18N[s.id].one:exOf(s.id).one;}
function sWhen(s){return (lang==='en'&&I18N[s.id])?I18N[s.id].when:exOf(s.id).when;}

/* ===================== HELPERS ===================== */
function lum(hex){
  if(!hex||hex[0]!=='#')return .25;
  let c=hex.length===4?('#'+hex[1]+hex[1]+hex[2]+hex[2]+hex[3]+hex[3]):hex;
  const r=parseInt(c.substr(1,2),16),g=parseInt(c.substr(3,2),16),b=parseInt(c.substr(5,2),16);
  return (0.299*r+0.587*g+0.114*b)/255;
}
const onColor=hex=>lum(hex)>0.6?'#111111':'#ffffff';
function famOf(font){return font==='mono'?'ui-monospace,monospace':font==='display'?'system-ui,Impact,"Arial Black",sans-serif':font==='serif'?'Georgia,"Times New Roman",serif':'system-ui,Arial,sans-serif';}

/* ============ MOCKUP RENDERER (cat + variant 0..2) ============ */
/* ===== 排版/版式维度（第二根主轴）：a=对齐 den=密度 sc=字阶 g=网格 u=大写 ls=字距 ===== */
const HSZ={xl:27,lg:22,md:18,sm:15};
const LAYO={
 'A-01':{a:'l',den:'airy',sc:'lg',g:0,u:0,ls:.04}, 'A-05':{a:'l',den:'dense',sc:'md',g:2,u:0,ls:0},

 'A-34':{a:'c',den:'airy',sc:'md',g:0,u:0,ls:.04}, 'A-24':{a:'l',den:'dense',sc:'xl',g:0,u:1,ls:0},
 'A-43':{a:'c',den:'airy',sc:'lg',g:0,u:0,ls:.06}, 'A-48':{a:'l',den:'dense',sc:'sm',g:2,u:1,ls:.06},
 'A-09':{a:'l',den:'dense',sc:'md',g:1,u:1,ls:.1}, 'A-11':{a:'l',den:'med',sc:'xl',g:1,u:0,ls:0},
 'A-40':{a:'l',den:'med',sc:'lg',g:1,u:0,ls:0},    'A-31':{a:'c',den:'med',sc:'xl',g:0,u:1,ls:0},
 'A-50':{a:'l',den:'med',sc:'xl',g:1,u:1,ls:0},    'A-59':{a:'l',den:'dense',sc:'md',g:2,u:0,ls:.02},
 'A-58':{a:'l',den:'airy',sc:'lg',g:0,u:0,ls:.04}, 'A-53':{a:'c',den:'airy',sc:'lg',g:0,u:0,ls:.03},
};
function layOf(s){
  const f=(s&&s.flags)||s||{};
  let L={a:'l',den:'med',sc:'lg',g:0,u:0,ls:.02};
  if(f.font==='mono'){L.u=1;L.ls=.08;L.den='dense';}
  if(f.font==='display'){L.sc='xl';L.u=1;}
  if(f.font==='serif'){L.u=0;L.ls=.01;}
  if(f.motif==='grid'){L.g=2;L.a='l';L.den='dense';}
  if(f.motif==='glass'||f.motif==='glow'){L.a='c';L.den='airy';L.sc='lg';}
  if(f.motif==='soft'){L.a='c';L.den='airy';}
  if(f.motif==='chrome'){L.a='c';L.sc='xl';}
  if(f.border>=3){L.sc='xl';L.u=1;L.g=0;}
  return Object.assign(L,(s&&s.id&&LAYO[s.id])||{});
}
function mockup(cat,s,v,L0){
  v=v||0;
  const f=(s&&s.flags)||s;
  const {bg,surface,ink,acc,acc2,radius,border,font,motif}=f;
  const L=L0||layOf(s&&s.flags?s:{flags:f});
  const fam=famOf(font);
  const r=radius+'px', bw=Math.max(border,0)+'px';
  const surf=surface.startsWith('rgba')?surface:surface;
  const glass=motif==='glass', glow=(motif==='glow'||glass);
  const blur=glass?'backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);':'';
  const shadow=glow?`box-shadow:0 0 14px ${acc}55;`:'';
  const back=glow
    ?`background:radial-gradient(70% 60% at 75% 15%, ${acc}33, transparent 60%),radial-gradient(70% 60% at 15% 95%, ${acc2}33, transparent 60%),${bg};`
    :`background:${bg};`;
  const gridM=motif==='grid'?`background-image:repeating-linear-gradient(90deg,${ink}14 0 1px,transparent 1px 22px),repeating-linear-gradient(0deg,${ink}14 0 1px,transparent 1px 22px);`:'';
  const gln=L.g>=2?`background-image:repeating-linear-gradient(90deg,${ink}1f 0 1px,transparent 1px 20px),repeating-linear-gradient(0deg,${ink}1f 0 1px,transparent 1px 20px);`:(L.g>=1?`background-image:repeating-linear-gradient(0deg,${ink}12 0 1px,transparent 1px 26px);`:'');
  const grid=gridM||gln;
  const bd=`border:${bw} solid ${ink};`;
  const accOn=onColor(acc);
  const chrome=motif==='chrome'?`background:linear-gradient(120deg,${acc},${acc2});`:`background:${acc};`;
  // 排版派生量
  const hs=HSZ[L.sc]||22;
  const tt=L.u?'text-transform:uppercase;':'';

  const ta=L.a==='c'?'center':'left';

  const nC=L.den==='airy'?2:3;
  const wrap=inner=>`<div style="position:absolute;inset:0;${back}${grid}font-family:${fam};color:${ink};padding:12px;overflow:hidden">${inner}</div>`;
  const card=(h,c)=>`<div style="height:${h}px;background:${c||surf};border-radius:${r};${blur}${motif==='grid'?'border:1px solid '+ink+'44;':''}"></div>`;

  if(cat==='WEB'){

      <div style="display:flex;gap:${L.den==='airy'?12:8}px;margin-top:14px;justify-content:${L.a==='c'?'center':'flex-start'}">${Array.from({length:nC}).map(()=>card(L.den==='airy'?46:40)).join('')}</div>`);
    if(v===1)return wrap(`
      <div style="text-align:center">
        <div style="font-weight:800;font-size:12px;letter-spacing:.2em;opacity:.7;margin-bottom:14px">◆ LOGO ◆</div>
        <div style="font-weight:800;font-size:${hs+2}px;line-height:1.0;${tt}${lss}">CENTERED<br>STATEMENT</div>
        <div style="font-size:10px;opacity:.65;margin:8px auto 12px;max-width:60%">one focused message, dead center.</div>
        <div style="display:inline-block;${chrome};color:${accOn};font-size:10px;padding:8px 20px;border-radius:${r};${shadow}${tt}${lss}">JOIN&nbsp;NOW</div>
        <div style="display:flex;gap:8px;margin-top:16px">${card(34)}${card(34)}</div></div>`);
    if(v===3)return wrap(`
      <div style="text-align:center;font-weight:800;font-size:${Math.max(hs-6,14)}px;margin-bottom:10px;${tt}${lss}">PRICING</div>
      <div style="display:flex;gap:7px">
        ${[0,1,2].map(i=>`<div style="flex:1;${i===1?chrome+';color:'+accOn+';':'background:'+surf+';'}border-radius:${r};${i===1?shadow:''}${blur}padding:8px 4px;text-align:center">
          <div style="font-size:8px;opacity:.8">TIER ${i+1}</div>
          <div style="font-weight:800;font-size:14px;margin:3px 0">$${(i+1)*9}</div>
          <div style="font-size:7px;opacity:.7;line-height:1.6">• core<br>• extra<br>• team</div>
          <div style="margin-top:6px;height:11px;border-radius:${r};background:${i===1?accOn:acc};opacity:.9"></div></div>`).join('')}

    if(v===4)return wrap(`
      <div style="font-size:8px;letter-spacing:.2em;opacity:.6;margin-bottom:6px">JOURNAL · 06.2026</div>
      <div style="font-weight:800;font-size:${hs}px;line-height:1.0;margin-bottom:8px;text-align:${ta};${tt}${lss}">THE ART<br>OF STYLE</div>

  const ax=LAYAXES[axis], cur=layEdit[axis];
  const segs=ax.vals.map((val,i)=>{const q=typeof val==='string'?`'${val}'`:val;
    return `<span class="gseg gclk${val===cur?' on':''}" onclick="setLay('${axis}',${q})">${(lang==='en'?LAYAXES_EN[axis]:ax.names)[i]}</span>`;}).join('');

  return [L.a==='c'?'居中':'左对齐',{xl:'大字主导',lg:'标准字阶',md:'中字号',sm:'紧凑小字'}[L.sc],
    {airy:'留白疏朗',med:'适中密度',dense:'信息密集'}[L.den],
    L.g>=2?'严格网格':(L.g>=1?'轻网格':'自由版式'),L.u?'全大写':'常规大小写',
    (L.ls>=.1?'宽字距':null)].filter(Boolean).join(' · ');

  const rows=['a','sc','den','g','u'].map(gsegEdit).join('');
  return `<div class="gauges">${rows}</div>
    <div class="laynar"><b>▸</b> <span id="laynartext">${narr(layEdit)}</span></div>`;
}
function setLay(axis,val){ if(!layEdit)return; layEdit[axis]=val; applyLayEdit(); }
function resetLay(){ if(!curDetailId)return; layEdit=Object.assign({},layOf(byId(curDetailId))); applyLayEdit(); }
function applyLayEdit(){
  const gb=document.getElementById('gaugebox'); if(gb) gb.innerHTML=layGaugesEditable();
  const rb=document.getElementById('layreset'); if(rb) rb.classList.toggle('show',isLayDirty());
  ['WEB','APP','POSTER','PACKAGING'].forEach(c=>{const el=document.getElementById('mock-'+c); if(el) el.innerHTML=mockup(c,byId(curDetailId),0,layEdit);});
  if(curStyle) renderModal();
}

function closeDetail(){detailView.classList.add('hide');if(boardOpen){boardView.classList.remove('hide');}else{listView.classList.remove('hide');}window.scrollTo(0,0);}

/* ===================== MODAL: enlarged sample carousel ===================== */
let curStyle=null,curCat=null,curVar=0;
const modalRoot=document.getElementById('modalRoot');
const CATZH={WEB:'网页',APP:'APP UI',POSTER:'海报平面',PACKAGING:'产品包装'};
function openSample(id,cat){curStyle=id;curCat=cat;curVar=0;renderModal();}
function closeSample(){modalRoot.innerHTML='';curStyle=null;}
function cycleSample(d){curVar=(curVar+d+6)%6;renderModal();}
function renderModal(){
  const s=byId(curStyle);
  modalRoot.innerHTML=`
    <div class="modal" onclick="if(event.target===this)closeSample()">
      <div class="box">
        <div class="mbar">
          <div class="t">${lang==='en'?({WEB:'Web',APP:'App UI',POSTER:'Poster',PACKAGING:'Packaging'}[curCat]):CATZH[curCat]} <small>${sName(s)} · ${lang==='en'?s.name:s.en} · SUBJECT ${s.id}</small></div>
          <button class="xbtn" onclick="closeSample()">✕ CLOSE</button>
        </div>
        <div class="bigwrap">
          <button class="arrow" onclick="cycleSample(-1)">‹</button>
          <div class="bigmock" id="bigmock"><div class="stage" id="stage">${mockup(curCat,s,curVar,(curStyle===curDetailId?layEdit:null))}</div></div>
          <button class="arrow" onclick="cycleSample(1)">›</button>
        </div>
        <div class="mfoot">
          <div class="dots">${[0,1,2,3,4,5].map(i=>`<i class="${i===curVar?'on':''}"></i>`).join('')} <span style="margin-left:8px">CASE ${curVar+1}/6</span></div>
          <div>${t('modalHint')}</div>
        </div>
      </div>
    </div>`;
  // scale stage to fill bigmock responsively (virtual 320x200)
  requestAnimationFrame(()=>{
    const bm=document.getElementById('bigmock'),st=document.getElementById('stage');
    if(!bm||!st)return;
    const w=bm.clientWidth, sc=w/320;
    bm.style.height=(200*sc)+'px';
    st.style.transform='scale('+sc+')';
  });
}
window.addEventListener('keydown',e=>{
  if(!curStyle)return;
  if(e.key==='ArrowLeft')cycleSample(-1);
  else if(e.key==='ArrowRight')cycleSample(1);
  else if(e.key==='Escape')closeSample();
});
window.addEventListener('resize',()=>{if(curStyle)renderModal();});

/* ===================== copy + toast + FX ===================== */
const toast=document.getElementById('toast');let tT;
function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>toast.classList.remove('show'),1400);}
function copyHex(el,hex){try{navigator.clipboard.writeText(hex)}catch(e){}el.classList.add('copied');setTimeout(()=>el.classList.remove('copied'),900);showToast('COPIED '+hex);}
function copyPrompt(id){const s=byId(id);try{navigator.clipboard.writeText(s.prompt)}catch(e){}showToast('PROMPT COPIED');}
function toggleFX(){
  const on=document.body.classList.toggle('fxhigh');
  document.getElementById('fxstate').textContent=on?'HIGH':'OFF';
  showToast('FX '+(on?'HIGH — 全特效':'OFF — 平静版'));
}

/* decorative readout strip */
function startReadout(){
  const el=document.getElementById('readout');
  function tick(){
    const t=new Date();
    const hex=Math.floor(Math.random()*4096).toString(16).padStart(3,'0').toUpperCase();
    el.innerHTML=`<span>SYS <b>OK</b></span><span>STYLES <b>${STYLES.length}</b></span><span>FPS <b>${58+Math.floor(Math.random()*5)}</b></span>`+
      `<span>MEM <b>${(34+Math.random()*4).toFixed(1)}%</b></span><span>HASH <b>0x${hex}</b></span>`+
      `<span>T <b>${t.toLocaleTimeString('en-GB')}</b></span><span>SCAN <b class="blink">▮</b></span>`;
  }
  tick();setInterval(tick,1200);
}

/* typing tagline */
function startTyping(){
  const el=document.getElementById('tw');if(!el)return;
  let li=0,ci=0,del=false;
  (function loop(){
    const lines=TYPING[lang];
    const txt=lines[li%lines.length];
    el.textContent=del?txt.slice(0,ci--):txt.slice(0,ci++);
    let d=del?28:55;
    if(!del&&ci>txt.length){d=1700;del=true;}
    else if(del&&ci<0){del=false;ci=0;li=(li+1)%lines.length;d=350;}
    setTimeout(loop,d);
  })();
}
/* init */
/* 电子干扰：每 5–9 秒短促抖一下（仅 FX HIGH） */
function startGlitch(){
  function tick(){
    const next=5000+Math.random()*4000;
    setTimeout(()=>{
      if(document.body.classList.contains('fxhigh')){
        document.body.classList.add('glitching');
        setTimeout(()=>document.body.classList.remove('glitching'),400);
        if(Math.random()<0.4){ // 偶尔来一次双连干扰，更像信号不稳
          setTimeout(()=>{document.body.classList.add('glitching');setTimeout(()=>document.body.classList.remove('glitching'),260);},560);
        }
      }
      tick();
    },next);
  }
  tick();
}
function toTop(){window.scrollTo({top:0,behavior:'smooth'});}
window.addEventListener('scroll',()=>{const b=document.getElementById('totop');if(b)b.classList.toggle('show',(window.scrollY||document.documentElement.scrollTop)>360);});
/* 语言切换：刷新静态文案 + 重渲染动态区 */
function applyLang(){
  try{document.documentElement.lang=lang;}catch(e){}
  const set=(id,txt)=>{const e=document.getElementById(id);if(e)e.textContent=txt;};
  set('subjn',STYLES.length);
  set('idxHint',t('idxHint'));
  set('fhFilter',t('fhFilter'));
  set('fhTypeset',t('fhTypeset'));
  set('fhTypesetHint',t('fhTypesetHint'));
  const lb=document.getElementById('langbtn');if(lb)lb.textContent=lang==='en'?'中文':'EN';
  const ft=document.getElementById('foot');if(ft)ft.innerHTML=t('foot1')+'<br>'+t('foot2');
  renderChips();renderLayChips();renderGrid();
  if(boardOpen)renderBoard();
  else if(curDetailId&&detailView&&!detailView.classList.contains('hide'))openDetail(curDetailId);
}
function toggleLang(){lang=lang==='en'?'zh':'en';try{localStorage.setItem('styledex_lang',lang);}catch(e){}applyLang();}
document.body.classList.add('fxhigh');
applyLang();updateFavCount();startReadout();startTyping();startGlitch();
</script>
